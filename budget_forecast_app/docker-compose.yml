name: django-forecast-project

services:
  app:
    image: my-forecast-docker-image
    container_name: django-forecast-container
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - vite
      - redis

  vite:
    image: node:22-alpine
    working_dir: /app/frontend
    command: ["npm", "run", "dev", "--", "--host"]
    volumes:
      - .:/app
    ports:
      - "5173:5173"

  redis:
    image: redis:7-alpine
    container_name: forecast-redis
    ports:
      - "6379:6379"
    restart: always

  celery:
    image: my-forecast-docker-image
    container_name: forecast-celery
    command: celery -A budget_forecast_app worker -l info
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    restart: always