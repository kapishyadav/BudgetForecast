name: django-forecast-project

services:
  app:
    image: my-forecast-docker-image
    container_name: django-forecast-container
    ports:
      - "8001:8000"
      - "5173:5173"
    volumes:
      - .:/app
    depends_on:
      - vite

  vite:
    image: node:22-alpine
    working_dir: /app
    command: ["npm", "run", "dev", "--", "--host"]
    volumes:
      - .:/app
    ports:
      - "5174:5173"