
<div id="dashboard-container" class="card">
    <h1>⚠️ Error</h1>
    <p>Something went wrong with the background worker.</p>
    
    <div class="error" style="background: #fdf9f5; padding: 1rem; border: 2px dashed #c0392b; border-radius: var(--radius); margin-bottom: 2rem;">
        {{ error }}
    </div>
    
    <button onclick="window.location.reload();">Try Another File</button>
</div>
