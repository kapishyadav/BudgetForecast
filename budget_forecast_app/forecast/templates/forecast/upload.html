<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Series Forecast Upload</title>
    <style>
        :root {
            /* ☕ Coffee-inspired color palette */
            --bg-color: #f7f3ee;          /* soft latte background */
            --primary: #3b2f2f;           /* dark roast text */
            --accent: #a47148;            /* medium coffee brown */
            --light-accent: #d8c3a5;      /* cappuccino tone */
            --shadow: 8px 8px 0 var(--accent);
            --radius: 14px;
            --transition: all 0.25s ease;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--primary);
        }

        .card {
            background: #fff;
            padding: 3rem 2.5rem;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            width: 440px;
            transition: var(--transition);
        }

        .card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0 var(--light-accent);
        }

        h1 {
            font-size: 2.0rem;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        p {
            color: var(--accent);
            margin-bottom: 2rem;
            font-size: 1rem;
            opacity: 0.8;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        input[type="file"] {
            border: 2px dashed var(--light-accent);
            background: #fdf9f5;
            padding: 1rem;
            width: 100%;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--primary);
            transition: var(--transition);
        }

        input[type="file"]:hover {
            background: #f5ede5;
            border-color: var(--accent);
        }

        button {
            margin-top: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--primary);
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary);
            box-shadow: 6px 6px 0 var(--accent);
            transform: translate(-3px, -3px);
        }

        .error {
            color: #c0392b;
            margin-top: 1rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--primary);
            opacity: 0.7;
        }

        .footer span {
            color: var(--accent);
            font-weight: 600;
        }

        .loading {
            margin-top: 1rem;
            display: none;
            font-weight: 500;
            color: var(--accent);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
    <!-- ✅ Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- ✅ jQuery (required by Select2) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ✅ Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</head>
<body>
    <div class="card">
        <h1>Time Series Forecast</h1>
        <p>Upload your CSV file to generate a Prophet-based budget forecast.</p>

        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="dataset" accept=".csv" required>
            <button type="submit">🚀 Run Forecast</button>
            <div class="loading" id="loading">Running model... please wait ⏳</div>


            <label for="forecast_type">📊 Select Forecast Type</label><br><br>
            <select name="forecast_type" id="forecast_type" required>
                <option value="monthly">Forecast by Monthly Aggregate</option>
                <option value="account">Forecast by Account</option>
                <option value="service">Forecast by Service</option>
            </select><br><br>

            <!-- Hidden by default -->
            <div id="account_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="account_name">Select Account Name</label>
                <select id="account_name" name="account_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="service_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="service_name">Select Service Name</label>
                <select id="service_name" name="service_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Built with <span>Prophet</span> · Django · ChartJS ⚡
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const forecastTypeSelect = document.getElementById('forecast_type');
        const accountNameWrapper = document.getElementById('account_name_wrapper');
        const serviceNameWrapper = document.getElementById('service_name_wrapper');

        // Hide dropdowns initially
        accountNameWrapper.style.display = 'none';
        serviceNameWrapper.style.display = 'none';

        // Show/hide account & service inputs based on forecast type
        forecastTypeSelect.addEventListener('change', function() {
            const type = this.value;

            if (type === 'account') {
                accountNameWrapper.style.display = 'block';
                serviceNameWrapper.style.display = 'none';
            } else if (type === 'service') {
                accountNameWrapper.style.display = 'block';
                serviceNameWrapper.style.display = 'block';
            } else {
                accountNameWrapper.style.display = 'none';
                serviceNameWrapper.style.display = 'none';
            }

            // Initialize Select2 when dropdown becomes visible
            initializeSelect2();
        });

        // Loading animation when form is submitted
        form.addEventListener('submit', (e) => {
            loading.style.display = 'block';

            // Wait a short moment to ensure Django session is updated
            setTimeout(() => {
                initializeSelect2();
            }, 1500); // enough for session save
        });

        // --- Function to initialize Select2 dynamically ---
        function initializeSelect2() {
            console.log("🔁 Initializing Select2 with latest file data...");

            // Destroy previous instances (to avoid duplicate bindings)
            if ($('#account_name').data('select2')) {
                $('#account_name').select2('destroy');
            }
            if ($('#service_name').data('select2')) {
                $('#service_name').select2('destroy');
            }

            // Initialize Select2 for Account Name
            $('#account_name').select2({
                placeholder: 'Search or select an account...',
                minimumInputLength: 1,
                width: '100%',
                ajax: {
                    url: '/get_suggestions/',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            field: 'account'
                        };
                    },
                    processResults: function (data) {
                        return {
                            results: (data.suggestions || []).map(item => ({ id: item, text: item }))
                        };
                    },
                    cache: false
                }
            });

            // Initialize Select2 for Service Name
            $('#service_name').select2({
                placeholder: 'Search or select a service...',
                minimumInputLength: 1,
                width: '100%',
                ajax: {
                    url: '/get_suggestions/',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            field: 'service'
                        };
                    },
                    processResults: function (data) {
                        return {
                            results: (data.suggestions || []).map(item => ({ id: item, text: item }))
                        };
                    },
                    cache: false
                }
            });
        }
    </script>



</body>
</html>
