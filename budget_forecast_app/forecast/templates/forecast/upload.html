<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Series Forecast Upload</title>
    <style>
        :root {
            /* ☕ Coffee-inspired color palette */
            --bg-color: #f7f3ee;          /* soft latte background */
            --primary: #3b2f2f;           /* dark roast text */
            --accent: #a47148;            /* medium coffee brown */
            --light-accent: #d8c3a5;      /* cappuccino tone */
            --shadow: 8px 8px 0 var(--accent);
            --radius: 14px;
            --transition: all 0.25s ease;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--primary);
        }

        .card {
            background: #fff;
            padding: 3rem 2.5rem;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            width: 440px;
            transition: var(--transition);
        }

        .card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 10px 10px 0 var(--light-accent);
        }

        h1 {
            font-size: 2.0rem;
            letter-spacing: 1px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        p {
            color: var(--accent);
            margin-bottom: 2rem;
            font-size: 1rem;
            opacity: 0.8;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        input[type="file"] {
            border: 2px dashed var(--light-accent);
            background: #fdf9f5;
            padding: 1rem;
            width: 100%;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--primary);
            transition: var(--transition);
        }

        input[type="file"]:hover {
            background: #f5ede5;
            border-color: var(--accent);
        }

        button {
            margin-top: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 6px 6px 0 var(--primary);
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary);
            box-shadow: 6px 6px 0 var(--accent);
            transform: translate(-3px, -3px);
        }

        .error {
            color: #c0392b;
            margin-top: 1rem;
            font-weight: 600;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--primary);
            opacity: 0.7;
        }

        .footer span {
            color: var(--accent);
            font-weight: 600;
        }

        .loading {
            margin-top: 1rem;
            display: none;
            font-weight: 500;
            color: var(--accent);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
    <!-- ✅ Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- ✅ jQuery (required by Select2) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- ✅ Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

</head>
<body>
    <div class="card">
        <h1>Time Series Forecast</h1>
        <p>Upload your CSV file to generate a Prophet-based budget forecast.</p>

        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="dataset" accept=".csv" required>


            <label for="forecast_type">📊 Select Forecast Type</label><br><br>
            <select name="forecast_type" id="forecast_type" required>
                <option value="monthly">Forecast by Monthly Aggregate</option>
                <option value="account">Forecast by Account</option>
                <option value="service">Forecast by Service</option>
                <option value="bu_code">Forecast by BU Code</option>
                <option value="segment">Forecast by Segment</option>
            </select><br><br>

            <!-- Hidden by default -->
            <div id="account_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="account_name">Select Account Name</label>
                <select id="account_name" name="account_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="service_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="service_name">Select Service Name</label>
                <select id="service_name" name="service_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="bu_code_wrapper" style="display: none; margin-top: 1rem;">
                <label for="bu_code">Select BU Code</label>
                <select id="bu_code" name="bu_code" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="segment_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="segment_name">Select Segment Name</label>
                <select id="segment_name" name="segment_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>


            <button type="submit">🚀 Run Forecast</button>
            <div class="loading" id="loading">Running model... please wait ⏳</div>

        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Built with <span>Prophet</span> · Django · ChartJS ⚡
        </div>
    </div>

    <script src="{% static 'forecast/js/upload.js' %}"></script>



</body>
</html>
