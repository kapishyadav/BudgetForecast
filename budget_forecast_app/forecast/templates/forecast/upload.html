<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Series Forecast Upload</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="{% static 'forecast/css/upload.css' %}">

    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
</head>
<body>
    <div class="card">
        <h1>Time Series Forecast</h1>
        <p>Upload your CSV file to generate a Prophet-based budget forecast.</p>

        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="dataset" accept=".csv" required>

            <label> Select Time Granularity</label><br>
            <div style="display: flex; gap: 15px; margin-bottom: 1.5rem; margin-top: 0.5rem;">
                <label><input type="radio" name="granularity" value="monthly" checked> Monthly</label>
                <label><input type="radio" name="granularity" value="daily"> Daily</label>
            </div>


            <label for="forecast_type">📊 Select Forecast Type</label><br><br>
            <select name="forecast_type" id="forecast_type" required>
                <option value="overall_aggregate">Overall Aggregate (No Filter)</option>
                <option value="account">Forecast by Account</option>
                <option value="service">Forecast by Service</option>
                <option value="bu_code">Forecast by BU Code</option>
                <option value="segment">Forecast by Segment</option>
            </select><br><br>

            <!-- Hidden by default -->
            <div id="account_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="account_name">Select Account Name</label>
                <select id="account_name" name="account_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="service_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="service_name">Select Service Name</label>
                <select id="service_name" name="service_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="bu_code_wrapper" style="display: none; margin-top: 1rem;">
                <label for="bu_code">Select BU Code</label>
                <select id="bu_code" name="bu_code" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>

            <!-- Hidden by default -->
            <div id="segment_name_wrapper" style="display: none; margin-top: 1rem;">
                <label for="segment_name">Select Segment Name</label>
                <select id="segment_name" name="segment_name" style="width: 100%;">
                    <!-- Options will be loaded dynamically -->
                </select>
            </div>


            <button type="submit">🚀 Run Forecast</button>
            <div class="loading" id="loading">Running model... please wait ⏳</div>

        </form>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <div class="footer">
            Built with <span>Prophet</span> · Django · ChartJS ⚡
        </div>
    </div>

    <script src="{% static 'forecast/js/upload.js' %}"></script>

</body>
</html>
